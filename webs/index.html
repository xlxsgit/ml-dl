<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机器学习知识点复习地图</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="app-container">
        <header>
            <div class="header-content">
                <div class="header-title-row">
                    <h1>知识点复习地图</h1>
                    <button id="open-graph-btn" class="glass-btn">
                        知识图谱
                    </button>
                </div>
                <p>记录与追踪你的机器学习与深度学习系统化知识</p>
            </div>
            <div class="overall-progress">
                <div class="progress-header">
                    <span class="label">总复习进度</span>
                    <span class="value" id="overall-percent">0%</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-fill" id="overall-fill"></div>
                </div>
            </div>
        </header>

        <div class="toolbar">
            <input type="text" id="search-input" placeholder="搜索知识点或词条..." />

            <button id="toggle-collapse-btn" class="glass-btn">全部展开</button>
        </div>

        <main id="category-container">
            <!-- Categories will be injected here dynamically by script.js -->
        </main>
    </div>

    <!-- Knowledge Graph Modal -->
    <div id="graph-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>知识点关联图谱</h2>
                <div style="display:flex; gap:10px;">
                    <button id="graph-expand-all" class="glass-btn-small">一键展开</button>
                    <button id="graph-collapse-all" class="glass-btn-small">一键收缩</button>
                    <button id="close-graph-btn" class="close-btn">✕</button>
                </div>
            </div>
            <div class="modal-body">
                <div id="graph-container"></div>
            </div>
        </div>
    </div>


    <!-- Term Note Modal -->
    <div id="note-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="note-modal-title">编辑笔记</h2>
                <button id="close-note-btn" class="close-btn">✕</button>
            </div>
            <div class="modal-body note-modal-body">
                <textarea id="note-textarea" placeholder="输入笔记内容，支持公式如 $E=mc^2$ ..."></textarea>
                <div class="preview-header">预览 (实时渲染):</div>
                <div id="note-preview-area" class="preview-area"></div>
            </div>
            <div class="modal-footer">
                <button id="save-note-btn" class="glass-btn primary-btn">保存</button>
            </div>
        </div>
    </div>

    <!-- QA Modal -->
    <div id="qa-modal" class="modal-overlay hidden">
        <div class="modal-content qa-modal-content">
            <div class="modal-header">
                <h2 id="qa-modal-title">问答笔记</h2>
                <button id="close-qa-btn" class="close-btn">✕</button>
            </div>
            <div class="modal-body">
                <div id="qa-list" class="qa-list"></div>
            </div>
            <div class="modal-footer">
                <button id="add-qa-btn" class="glass-btn primary-btn">添加新问答</button>
            </div>
        </div>
    </div>

    <!-- QA Editor Modal (Nested/Secondary) -->
    <div id="qa-editor-modal" class="modal-overlay hidden">
        <div class="modal-content qa-editor-content">
            <div class="modal-header">
                <h2 id="qa-editor-title">编辑问答</h2>
                <button id="close-qa-editor-btn" class="close-btn">✕</button>
            </div>
            <div class="modal-body">
                <textarea id="qa-question" placeholder="输入问题 (支持公式...)"></textarea>
                <textarea id="qa-answer" placeholder="输入参考答案 (支持公式...)"></textarea>
                <div class="preview-header">预览 (实时渲染):</div>
                <div id="qa-preview-area" class="preview-area"></div>
            </div>
            <div class="modal-footer">
                <button id="save-qa-btn" class="glass-btn primary-btn">保存问答</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
