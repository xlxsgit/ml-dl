<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机器学习知识点复习地图</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>
    
    <div class="app-container">
        <header>
            <div class="header-content">
                <div class="header-title-row">
                    <h1>知识点复习地图</h1>
                    <button id="open-graph-btn" class="glass-btn">
                        知识图谱
                    </button>
                </div>
                <p>记录与追踪你的机器学习与深度学习系统化知识</p>
            </div>
            <div class="overall-progress">
                <div class="progress-header">
                    <span class="label">总复习进度</span>
                    <span class="value" id="overall-percent">0%</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-fill" id="overall-fill"></div>
                </div>
            </div>
        </header>

        <main id="category-container">
            <!-- Categories will be injected here dynamically by script.js -->
        </main>
    </div>

    <!-- Knowledge Graph Modal -->
    <div id="graph-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>知识点关联图谱</h2>
                <button id="close-graph-btn" class="close-btn">✕</button>
            </div>
            <div class="modal-body">
                <div id="graph-container"></div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
